name: Deploy to Kubernetes

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set lowercase image name
      run: |
        echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        platforms: linux/arm64
        tags: ${{ env.IMAGE_NAME }}/frontend:latest

    - name: Build and push api-catalogue
      uses: docker/build-push-action@v5
      with:
        context: ./api-catalogue
        push: true
        platforms: linux/arm64
        tags: ${{ env.IMAGE_NAME }}/api-catalogue:latest

    - name: Build and push api-orders
      uses: docker/build-push-action@v5
      with:
        context: ./api-orders
        push: true
        platforms: linux/arm64
        tags: ${{ env.IMAGE_NAME }}/api-orders:latest

    - name: Install kubectl
      run: |
        curl -fsSLo kubectl https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl
        kubectl version --client

    - name: Configure kubeconfig
      run: |
        mkdir -p "$HOME/.kube"
        printf '%s' "${{ secrets.KUBE_CONFIG_DATA_B64 }}" | base64 --decode > "$HOME/.kube/config"
        sed -i "s#127.0.0.1#${{ secrets.KUBE_API_SERVER }}#g" "$HOME/.kube/config"
        chmod 600 "$HOME/.kube/config"

    - name: Ensure namespace exists
      run: |
        kubectl create namespace projet-final --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Kubernetes secrets from GitHub Secrets
      run: |
        kubectl create secret generic app-secret \
          -n projet-final \
          --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
          --dry-run=client -o yaml | kubectl apply -f -

        kubectl create secret generic grafana-secret \
          -n projet-final \
          --from-literal=admin-password="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy to Kubernetes
      uses: azure/k8s-deploy@v4
      with:
        namespace: projet-final
        manifests: |
          k8s/infra/namespace.yaml
          k8s/infra/configmap.yaml
          k8s/data/postgres-init-configmap.yaml
          k8s/data/postgres-statefulset.yaml
          k8s/data/postgres-service.yaml
          k8s/apps/frontend-deployment.yaml
          k8s/apps/frontend-service.yaml
          k8s/apps/api-catalogue-deployment.yaml
          k8s/apps/api-catalogue-service.yaml
          k8s/apps/api-orders-deployment.yaml
          k8s/apps/api-orders-service.yaml
          k8s/apps/api-orders-hpa.yaml
          k8s/infra/ingress.yaml
          k8s/monitoring/prometheus.yaml
          k8s/monitoring/grafana.yaml