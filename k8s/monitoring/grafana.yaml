apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: projet-final
spec:
  replicas: 1
  # Recreate évite qu'un rollout tente de monter la même PVC ReadWriteOnce sur 2 pods à la fois.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: app-sa
      securityContext:
        fsGroup: 472 # aligne le groupe propriétaire de la PVC sur l'utilisateur "grafana" de l'image
      containers:
      - name: grafana
        image: grafana/grafana:latest
        securityContext:
          runAsNonRoot: true
          runAsUser: 472
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-secret
              key: admin-password
        - name: GF_SERVER_ROOT_URL
          value: "http://89.168.46.10/grafana"
        - name: GF_SERVER_SERVE_FROM_SUB_PATH
          value: "true"
        resources:
          # 256Mi de limite provoquait un OOMKill régulier (indexation des dashboards/
          # recherche + bundles react servis en mémoire), qui se traduisait par des
          # 502 côté ingress pendant le redémarrage du pod (une seule replica).
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: dashboards-provider
          mountPath: /etc/grafana/provisioning/dashboards
        - name: dashboards
          mountPath: /var/lib/grafana-dashboards
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: dashboards-provider
        configMap:
          name: grafana-dashboards-provider
      - name: dashboards
        configMap:
          name: grafana-dashboards

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: projet-final
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi

---
# Provisionne automatiquement Prometheus comme datasource au démarrage de Grafana,
# pour ne pas avoir à le configurer à la main pendant la démo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: projet-final
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus-service:9090
      isDefault: true
      editable: true

---
# Déclare le provider de dashboards "as code": Grafana charge tout fichier .json posé
# dans /var/lib/grafana-dashboards au démarrage, pas besoin de cliquer dans l'UI.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: projet-final
data:
  provider.yml: |
    apiVersion: 1
    providers:
    - name: default
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      updateIntervalSeconds: 30
      allowUiUpdates: true
      options:
        path: /var/lib/grafana-dashboards

---
# Dashboard provisionné automatiquement (survit à un redéploiement / une PVC vide,
# contrairement à un dashboard créé à la main dans l'UI). Les métriques scrapées par
# Prometheus portent le label "kubernetes_namespace" (pas "namespace", voir le
# relabel_configs dans prometheus.yaml) et "app" (mappé depuis le label de pod "app").
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: projet-final
data:
  api-overview.json: |
    {
      "uid": "api-overview",
      "title": "API Overview - projet-final",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Requêtes / sec par service",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{kubernetes_namespace=\"projet-final\"}[1m])) by (app)",
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Latence p95 par service",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": "Prometheus",
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{kubernetes_namespace=\"projet-final\"}[5m])) by (le, app))",
              "legendFormat": "{{app}} p95",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Erreurs 5xx / sec par service",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{kubernetes_namespace=\"projet-final\", status_code=~\"5..\"}[1m])) by (app)",
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Pods up",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(up{kubernetes_namespace=\"projet-final\"}) by (app)",
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "bargauge",
          "title": "Appels totaux par endpoint",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(http_requests_total{kubernetes_namespace=\"projet-final\"}) by (app, method, route)",
              "legendFormat": "{{app}} {{method}} {{route}}",
              "refId": "A",
              "instant": true
            }
          ]
        }
      ]
    }

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: projet-final
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP

---
# Ingress séparé sans rewrite-target : Grafana reçoit le chemin complet (/grafana/...)
# ce qui est requis quand GF_SERVER_SERVE_FROM_SUB_PATH=true.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: projet-final
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /grafana(/|$)
        pathType: ImplementationSpecific
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
