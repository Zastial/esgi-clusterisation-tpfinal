apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-orders-hpa
  namespace: projet-final
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-orders
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

    scaleDown:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30