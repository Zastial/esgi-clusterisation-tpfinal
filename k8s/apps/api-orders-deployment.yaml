apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-orders
  namespace: projet-final
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-orders
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api-orders
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: app-sa
      containers:
      - name: api-orders
        # :latest est un placeholder — la CI injecte le tag du commit (sha court) au déploiement.
        # Pour un apply manuel, remplacez par un tag précis (ex: api-orders:abcdef1).
        image: ghcr.io/zastial/esgi-clusterisation-tpfinal/api-orders:latest
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /orders
            port: 3001
            httpHeaders:
            - name: Content-Type
              value: application/json
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"