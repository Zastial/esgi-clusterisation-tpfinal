apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: projet-final
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: app-sa
      containers:
      - name: frontend
        # :latest est un placeholder — la CI injecte le tag du commit (sha court) au déploiement.
        # Pour un apply manuel, remplacez par un tag précis (ex: frontend:abcdef1).
        image: ghcr.io/zastial/esgi-clusterisation-tpfinal/frontend:latest
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          runAsGroup: 101
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["NET_BIND_SERVICE"] # nginx doit pouvoir bind le port 80 (privilégié) sans être root
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"