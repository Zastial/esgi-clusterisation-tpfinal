apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-catalogue
  namespace: projet-final
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-catalogue
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api-catalogue
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: app-sa
      containers:
      - name: api-catalogue
        # :latest est un placeholder — la CI injecte le tag du commit (sha court) au déploiement.
        # Pour un apply manuel, remplacez par un tag précis (ex: api-catalogue:abcdef1).
        image: ghcr.io/zastial/esgi-clusterisation-tpfinal/api-catalogue:latest
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 60
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"