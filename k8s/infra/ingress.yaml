apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: projet-final
  annotations:
    # Chaque path ci-dessous capture dans $1 le chemin à transmettre au backend.
    # Ex: /api/catalogue -> group1="catalogue" -> réécrit en /catalogue.
    # Ex: /prometheus/graph -> group1="graph" -> réécrit en /graph.
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
  - host: app.local
    http:
      paths:
      - path: /api/(catalogue(?:/.*)?)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-catalogue-service
            port:
              number: 3000
      - path: /api/(orders(?:/.*)?)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-orders-service
            port:
              number: 3001
      - path: /prometheus(?:/(.*))?
        pathType: ImplementationSpecific
        backend:
          service:
            name: prometheus-service
            port:
              number: 9090
      - path: /grafana(?:/(.*))?
        pathType: ImplementationSpecific
        backend:
          service:
            name: grafana-service
            port:
              number: 3000
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service
            port:
              number: 80