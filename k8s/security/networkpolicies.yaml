# Default-deny + règles explicites pour les flux réellement utilisés par l'app.
#
# IMPORTANT: la règle "allow-*-from-ingress" suppose que le contrôleur ingress-nginx
# tourne dans un namespace nommé "ingress-nginx" (cas par défaut du manifest officiel
# utilisé dans RUNBOOK.md). Kubernetes ajoute automatiquement le label
# kubernetes.io/metadata.name=<nom-du-namespace> depuis la 1.21, donc ça doit matcher
# tel quel sur un cluster récent (k3s inclus). Si votre ingress-nginx tourne ailleurs,
# adaptez le namespaceSelector ci-dessous — sinon le frontend/les APIs deviennent
# injoignables depuis l'extérieur.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: projet-final
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-from-ingress
  namespace: projet-final
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-catalogue-ingress
  namespace: projet-final
spec:
  podSelector:
    matchLabels:
      app: api-catalogue
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-orders-ingress
  namespace: projet-final
spec:
  podSelector:
    matchLabels:
      app: api-orders
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 3001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-apis
  namespace: projet-final
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-catalogue
    - podSelector:
        matchLabels:
          app: api-orders
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-from-ingress
  namespace: projet-final
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    - podSelector:
        matchLabels:
          app: grafana  # Grafana doit pouvoir interroger Prometheus pour les dashboards
    ports:
    - protocol: TCP
      port: 9090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-from-ingress
  namespace: projet-final
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000

---
# Egress: même logique que l'ingress, default-deny + règles explicites. Sans ça, tous
# les pods du namespace (y compris postgres) peuvent initier n'importe quelle connexion
# sortante, y compris vers Internet.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: projet-final
spec:
  podSelector: {}
  policyTypes:
  - Egress
---
# La résolution DNS passe par CoreDNS dans kube-system pour tous les pods (Service
# discovery par nom, ex: postgres-service). Sans cette règle, plus aucune requête DNS
# ne sort et tout le reste casse silencieusement.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: projet-final
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apis-egress-to-postgres
  namespace: projet-final
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values: ["api-catalogue", "api-orders"]
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-egress-to-targets
  namespace: projet-final
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: api-catalogue
    ports:
    - protocol: TCP
      port: 3000
  - to:
    - podSelector:
        matchLabels:
          app: api-orders
    ports:
    - protocol: TCP
      port: 3001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-egress-to-prometheus
  namespace: projet-final
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 9090
